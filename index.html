<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elixir — Académie des Arts Magiques</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0C0A12; --surface: #13101E; --card: #1A1628; --border: #2A2240;
      --gold: #C9A84C; --gold-light: #E8C96A; --purple: #7B5EA7;
      --purple-light: #A07DD4; --teal: #4A9B8E; --text: #E8E0D0;
      --muted: #7A6E88; --red: #C0392B; --green: #27AE60;
    }
    html, body { height: 100%; font-family: 'Crimson Text', Georgia, serif; background: var(--bg); color: var(--text); }

    /* HEADER */
    .header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 18px 28px; display: flex; align-items: center; gap: 16px;
      position: sticky; top: 0; z-index: 50;
    }
    .header::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
    .crest { width:48px; height:48px; border:2px solid var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22px; background:var(--card); flex-shrink:0; color:var(--gold); }
    .server-name { font-family:'Cinzel',serif; font-size:18px; font-weight:700; color:var(--gold); letter-spacing:2px; line-height:1.2; }
    .server-sub { font-style:italic; font-size:13px; color:var(--muted); margin-top:2px; }
    .header-stats { margin-left:auto; display:flex; gap:14px; align-items:center; }
    .stat-pill { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:5px 14px; font-family:'Cinzel',serif; font-size:11px; color:var(--muted); display:flex; align-items:center; gap:6px; white-space:nowrap; }
    .stat-pill b { color:var(--gold); font-weight:600; }

    /* TOOLBAR */
    .toolbar { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 24px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; position:sticky; top:85px; z-index:40; }
    .search-box { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:7px 12px; color:var(--text); font-size:14px; font-family:'Crimson Text',serif; width:220px; outline:none; transition:border-color 0.2s; }
    .search-box::placeholder { color:var(--muted); font-style:italic; }
    .search-box:focus { border-color:var(--gold); }
    .filter-btn { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:6px 14px; color:var(--muted); font-size:13px; font-family:'Crimson Text',serif; cursor:pointer; transition:all 0.2s; }
    .filter-btn.active,.filter-btn:hover { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,0.08); }
    .filter-btn.f-principale.active,.filter-btn.f-principale:hover { border-color:var(--purple-light); color:var(--purple-light); background:rgba(123,94,167,0.1); }
    .filter-btn.f-secondaire.active,.filter-btn.f-secondaire:hover { border-color:var(--teal); color:var(--teal); background:rgba(74,155,142,0.1); }
    .btn-add { margin-left:auto; background:var(--gold); border:none; border-radius:6px; padding:8px 18px; color:#0C0A12; font-size:14px; font-weight:600; font-family:'Cinzel',serif; cursor:pointer; display:flex; align-items:center; gap:7px; transition:opacity 0.2s; letter-spacing:0.5px; }
    .btn-add:hover { opacity:0.85; }

    /* MAIN */
    .main { padding:24px 28px; }
    .section-block { margin-bottom:32px; }
    .section-header { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .section-title { font-family:'Cinzel',serif; font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); white-space:nowrap; }
    .section-line { flex:1; height:1px; background:linear-gradient(90deg,var(--border),transparent); }
    .section-count { font-family:'Cinzel',serif; font-size:10px; color:var(--muted); white-space:nowrap; }
    .courses-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }

    /* CARD */
    .course-card { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; transition:all 0.25s; position:relative; display:flex; flex-direction:column; }
    .course-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; z-index:1; }
    .course-card.mat-principale::before { background:linear-gradient(90deg,var(--purple),var(--purple-light)); }
    .course-card.mat-secondaire::before { background:linear-gradient(90deg,var(--teal),#6DC9BD); }
    .course-card:hover { border-color:var(--gold); transform:translateY(-2px); box-shadow:0 4px 24px rgba(201,168,76,0.12); }
    .card-image { width:100%; height:150px; object-fit:cover; display:block; cursor:zoom-in; }
    .card-body { padding:14px; flex:1; display:flex; flex-direction:column; }
    .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
    .mat-badge { font-size:10px; font-family:'Cinzel',serif; letter-spacing:1px; padding:3px 9px; border-radius:4px; text-transform:uppercase; }
    .badge-principale { background:rgba(123,94,167,0.18); color:var(--purple-light); border:1px solid rgba(123,94,167,0.35); }
    .badge-secondaire { background:rgba(74,155,142,0.15); color:var(--teal); border:1px solid rgba(74,155,142,0.3); }
    .course-score { font-family:'Cinzel',serif; font-size:17px; font-weight:700; }
    .score-a { color:var(--green); } .score-b { color:#5DADE2; } .score-c { color:var(--gold); } .score-d { color:var(--red); } .score-none { color:var(--muted); font-size:12px; font-style:italic; }
    .course-name { font-size:16px; font-weight:600; color:var(--text); margin-bottom:4px; line-height:1.35; }
    .course-instructor { font-size:13px; font-style:italic; color:var(--muted); margin-bottom:8px; }
    .stars { display:flex; gap:3px; margin-bottom:8px; }
    .star { font-size:14px; } .star.on { color:var(--gold); } .star.off { color:var(--border); }
    .card-imgs { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
    .card-img-thumb { width:54px; height:54px; object-fit:cover; border-radius:5px; border:1px solid var(--border); cursor:zoom-in; transition:border-color 0.2s; }
    .card-img-thumb:hover { border-color:var(--gold); }
    .tag-list { display:flex; gap:5px; flex-wrap:wrap; margin-top:4px; }
    .tag { background:rgba(201,168,76,0.07); border:1px solid rgba(201,168,76,0.2); border-radius:4px; padding:2px 7px; font-size:11px; color:var(--gold); font-style:italic; }
    .note-preview { font-size:13px; font-style:italic; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; border-top:1px solid var(--border); padding-top:8px; margin-top:8px; }
    .card-actions { display:flex; gap:8px; margin-top:12px; }
    .btn-sm { background:transparent; border:1px solid var(--border); border-radius:5px; padding:5px 11px; color:var(--muted); font-size:12px; font-family:'Crimson Text',serif; cursor:pointer; transition:all 0.2s; }
    .btn-sm:hover { border-color:var(--gold); color:var(--gold); }
    .btn-sm.danger:hover { border-color:var(--red); color:var(--red); }
    .empty-state { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted); font-style:italic; font-size:16px; }
    .empty-state span { display:block; font-size:13px; margin-top:8px; }

    /* MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.84); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; }
    .modal { background:var(--surface); border:1px solid var(--gold); border-radius:14px; padding:28px; width:100%; max-width:540px; max-height:92vh; overflow-y:auto; position:relative; }
    .modal::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,transparent,var(--gold),transparent); border-radius:14px 14px 0 0; }
    .modal-title { font-family:'Cinzel',serif; font-size:15px; color:var(--gold); letter-spacing:2px; margin-bottom:22px; display:flex; align-items:center; gap:10px; }
    .form-row { margin-bottom:14px; }
    .form-label { font-family:'Cinzel',serif; font-size:10px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:6px; display:block; }
    .form-input,.form-select,.form-textarea { width:100%; background:var(--card); border:1px solid var(--border); border-radius:6px; padding:9px 12px; color:var(--text); font-size:14px; font-family:'Crimson Text',serif; outline:none; transition:border-color 0.2s; }
    .form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--gold); }
    .form-select option { background:#1A1628; }
    .form-textarea { resize:vertical; min-height:80px; }
    .divider { height:1px; background:var(--border); margin:16px 0; }

    /* IMAGE UPLOAD */
    .img-upload-area { border:2px dashed var(--border); border-radius:8px; padding:20px; text-align:center; cursor:pointer; transition:all 0.2s; color:var(--muted); font-style:italic; font-size:13px; position:relative; }
    .img-upload-area:hover { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,0.04); }
    .img-upload-area input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .img-preview-list { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .img-preview-item { position:relative; }
    .img-preview-thumb { width:72px; height:72px; object-fit:cover; border-radius:6px; border:1px solid var(--border); display:block; }
    .img-remove-btn { position:absolute; top:-6px; right:-6px; background:var(--red); border:none; border-radius:50%; width:20px; height:20px; cursor:pointer; color:#fff; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; }

    /* SCORE */
    .score-picker { display:flex; gap:8px; flex-wrap:wrap; }
    .score-option { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:8px 18px; cursor:pointer; font-weight:600; font-family:'Cinzel',serif; font-size:14px; transition:all 0.2s; min-width:52px; text-align:center; color:var(--muted); }
    .score-option:hover { border-color:var(--gold); color:var(--gold); }
    .score-option.s-a.selected { border-color:var(--green); background:rgba(39,174,96,0.1); color:var(--green); }
    .score-option.s-b.selected { border-color:#5DADE2; background:rgba(93,173,226,0.1); color:#5DADE2; }
    .score-option.s-c.selected { border-color:var(--gold); background:rgba(201,168,76,0.1); color:var(--gold); }
    .score-option.s-d.selected { border-color:var(--red); background:rgba(192,57,43,0.1); color:var(--red); }
    .score-option.s-e.selected,.score-option.s-na.selected { border-color:var(--muted); background:rgba(122,110,136,0.1); color:var(--muted); }
    .stars-picker { display:flex; gap:8px; }
    .star-pick { font-size:26px; cursor:pointer; transition:transform 0.1s; color:var(--border); user-select:none; }
    .star-pick:hover { transform:scale(1.2); }
    .star-pick.on { color:var(--gold); }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:22px; }
    .btn-cancel { background:transparent; border:1px solid var(--border); border-radius:6px; padding:9px 20px; color:var(--muted); font-size:14px; font-family:'Crimson Text',serif; cursor:pointer; transition:all 0.2s; }
    .btn-cancel:hover { border-color:var(--muted); color:var(--text); }
    .btn-save { background:var(--gold); border:none; border-radius:6px; padding:9px 24px; color:#0C0A12; font-size:14px; font-weight:600; font-family:'Cinzel',serif; cursor:pointer; transition:opacity 0.2s; letter-spacing:0.5px; }
    .btn-save:hover { opacity:0.85; }

    /* TOAST */
    .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:var(--card); border:1px solid var(--gold); border-radius:8px; padding:10px 20px; font-family:'Cinzel',serif; font-size:12px; color:var(--gold); letter-spacing:1px; opacity:0; transition:opacity 0.3s; z-index:300; pointer-events:none; }
    .toast.show { opacity:1; }

    /* LIGHTBOX */
    .lightbox { position:fixed; inset:0; background:rgba(0,0,0,0.94); display:none; align-items:center; justify-content:center; z-index:200; }
    .lightbox.open { display:flex; }
    .lightbox img { max-width:90vw; max-height:88vh; border-radius:8px; border:2px solid var(--gold); object-fit:contain; cursor:zoom-out; }
    .lb-close { position:absolute; top:20px; right:24px; background:var(--card); border:1px solid var(--border); border-radius:50%; width:38px; height:38px; color:var(--muted); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
    .lb-close:hover { border-color:var(--gold); color:var(--gold); }
    .lb-nav { position:absolute; top:50%; transform:translateY(-50%); background:rgba(19,16,30,0.85); border:1px solid var(--border); border-radius:50%; width:46px; height:46px; color:var(--text); font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
    .lb-nav:hover { border-color:var(--gold); color:var(--gold); }
    .lb-prev { left:24px; } .lb-next { right:24px; }
    .lb-counter { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); font-family:'Cinzel',serif; font-size:11px; color:var(--muted); letter-spacing:2px; }

    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--muted); }
  </style>
</head>
<body>

<div class="header">
  <div class="crest">✦</div>
  <div>
    <div class="server-name">ELIXIR — ACADÉMIE DES ARTS MAGIQUES</div>
    <div class="server-sub">Registre personnel des cours &amp; formations</div>
  </div>
  <div class="header-stats">
    <div class="stat-pill">✦ <b id="stat-total">0</b>&nbsp;cours suivis</div>
    <div class="stat-pill">Moyenne :&nbsp;<b id="stat-avg">—</b></div>
  </div>
</div>

<div class="toolbar">
  <input class="search-box" id="search-input" type="text" placeholder="🔍 Chercher un cours, un professeur…" />
  <button class="filter-btn active" data-filter="all">Tous</button>
  <button class="filter-btn f-principale" data-filter="principale">✦ Principales</button>
  <button class="filter-btn f-secondaire" data-filter="secondaire">◈ Secondaires</button>
  <button class="btn-add" id="btn-add">+ Ajouter un cours</button>
</div>

<div class="main" id="main-content"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none;">
  <div class="modal">
    <div class="modal-title">✦ <span id="modal-title-text">Nouveau cours</span></div>
    <div class="form-row">
      <label class="form-label">Matière *</label>
      <select class="form-select" id="f-matiere">
        <optgroup label="— Matières Principales —">
          <option value="Sortilège">Sortilège</option>
          <option value="Défenses contre les forces opposées">Défenses contre les forces opposées</option>
          <option value="Créatures magiques">Créatures magiques</option>
          <option value="Histoire de la magie">Histoire de la magie</option>
          <option value="Potions">Potions</option>
          <option value="Botanique">Botanique</option>
        </optgroup>
        <optgroup label="— Matières Secondaires —">
          <option value="Étude des non-mages">Étude des non-mages</option>
          <option value="Métamorphose">Métamorphose</option>
          <option value="Runes">Runes</option>
          <option value="Cuisine">Cuisine</option>
          <option value="Divination">Divination</option>
          <option value="Vol">Vol</option>
        </optgroup>
        <optgroup label="— Autre —">
          <option value="Autre">Autre (personnalisé)</option>
        </optgroup>
      </select>
    </div>
    <div class="form-row" id="custom-name-row" style="display:none;">
      <label class="form-label">Nom personnalisé</label>
      <input class="form-input" id="f-custom-name" type="text" placeholder="Nom du cours…" />
    </div>
    <div class="form-row">
      <label class="form-label">Type</label>
      <select class="form-select" id="f-type">
        <option value="principale">Matière Principale</option>
        <option value="secondaire">Matière Secondaire</option>
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">Professeur / Instructeur</label>
      <input class="form-input" id="f-instructor" type="text" placeholder="Pseudo RP du professeur…" />
    </div>
    <div class="form-row">
      <label class="form-label">Date du cours</label>
      <input class="form-input" id="f-date" type="date" />
    </div>
    <div class="divider"></div>
    <div class="form-row">
      <label class="form-label">Photos / Captures du cours</label>
      <div class="img-upload-area" id="upload-area">
        <input type="file" accept="image/*" multiple id="img-file-input" />
        <div style="font-size:28px;margin-bottom:6px;">🖼</div>
        Clique ici ou glisse des images (captures d'écran, screenshots…)
      </div>
      <div class="img-preview-list" id="img-preview-list"></div>
    </div>
    <div class="divider"></div>
    <div class="form-row">
      <label class="form-label">Note obtenue</label>
      <div class="score-picker">
        <div class="score-option s-a" data-score="A">A</div>
        <div class="score-option s-b" data-score="B">B</div>
        <div class="score-option s-c" data-score="C">C</div>
        <div class="score-option s-d" data-score="D">D</div>
        <div class="score-option s-e" data-score="Échec" style="font-size:11px;padding:8px 10px;min-width:60px;">Échec</div>
        <div class="score-option s-na" data-score="N/A" style="font-size:11px;padding:8px 10px;">N/A</div>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Appréciation (1 à 5 étoiles)</label>
      <div class="stars-picker" id="stars-picker">
        <span class="star-pick" data-v="1">★</span>
        <span class="star-pick" data-v="2">★</span>
        <span class="star-pick" data-v="3">★</span>
        <span class="star-pick" data-v="4">★</span>
        <span class="star-pick" data-v="5">★</span>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Notes &amp; observations personnelles</label>
      <textarea class="form-textarea" id="f-notes" placeholder="Ce que tu as retenu, sortilèges appris, difficultés rencontrées…"></textarea>
    </div>
    <div class="form-row">
      <label class="form-label">Mots-clés (séparés par des virgules)</label>
      <input class="form-input" id="f-tags" type="text" placeholder="Ex: sorts, duel, herbologie…" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel">Annuler</button>
      <button class="btn-save" id="btn-save">✦ Enregistrer</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">✕</button>
  <button class="lb-nav lb-prev" id="lb-prev">‹</button>
  <img id="lb-img" src="" alt="Image du cours" />
  <button class="lb-nav lb-next" id="lb-next">›</button>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  /* ════════════════════════════════
     ÉTAT & CONSTANTES
  ════════════════════════════════ */
  const STORAGE_KEY  = 'elixir_magie_cours_v3';
  const PRINCIPALES  = ['Sortilège','Défenses contre les forces opposées','Créatures magiques','Histoire de la magie','Potions','Botanique'];
  const SECONDAIRES  = ['Étude des non-mages','Métamorphose','Runes','Cuisine','Divination','Vol'];

  let courses       = [];
  let currentFilter = 'all';
  let editingId     = null;
  let selectedScore = '';
  let selectedStars = 0;
  let pendingImages = [];   // [{dataUrl}]
  let lbImages      = [];
  let lbIndex       = 0;

  /* ════════════════════════════════
     LOCALSTORAGE
  ════════════════════════════════ */
  function loadCourses() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) courses = JSON.parse(raw);
    } catch(e) { courses = []; }
  }

  function saveCourses() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(courses));
    } catch(e) {
      alert('⚠️ Stockage insuffisant. Essaie de supprimer des cours avec beaucoup d\'images.');
    }
  }

  // Sauvegarde automatique à la fermeture / mise en arrière-plan
  window.addEventListener('beforeunload', saveCourses);
  window.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') saveCourses();
  });

  /* ════════════════════════════════
     HELPERS
  ════════════════════════════════ */
  function getAutoType(name) {
    if (PRINCIPALES.includes(name)) return 'principale';
    if (SECONDAIRES.includes(name)) return 'secondaire';
    return null;
  }

  function scoreClass(s) {
    if (!s || s === 'N/A' || s === 'Échec') return 'score-none';
    if (s === 'A') return 'score-a';
    if (s === 'B') return 'score-b';
    if (s === 'C') return 'score-c';
    return 'score-d';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function fileToDataUrl(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload  = e => res(e.target.result);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

  /* ════════════════════════════════
     RENDU GRILLE
  ════════════════════════════════ */
  function buildCard(c) {
    const stars    = Array.from({length:5}, (_,i) =>
      `<span class="star ${i < (c.stars||0) ? 'on' : 'off'}">★</span>`).join('');
    const tags     = (c.tags||[]).slice(0,4).map(t =>
      `<span class="tag">${esc(t)}</span>`).join('');
    const imgs     = c.images || [];
    const dateStr  = c.date ? ` &nbsp;·&nbsp; ${c.date}` : '';

    const firstImg = imgs.length
      ? `<img class="card-image" src="${imgs[0]}" alt="Image" loading="lazy"
           data-course-id="${c.id}" data-img-index="0" />`
      : '';

    const thumbs = imgs.length > 1
      ? `<div class="card-imgs">${imgs.slice(1).map((_, i) =>
          `<img class="card-img-thumb" src="${imgs[i+1]}" alt="Photo ${i+2}" loading="lazy"
             data-course-id="${c.id}" data-img-index="${i+1}" />`
        ).join('')}</div>`
      : '';

    return `
      <div class="course-card mat-${c.type}" data-id="${c.id}">
        ${firstImg}
        <div class="card-body">
          <div class="card-top">
            <span class="mat-badge badge-${c.type}">
              ${c.type === 'principale' ? '✦ Principale' : '◈ Secondaire'}
            </span>
            <span class="course-score ${scoreClass(c.score)}">${c.score || '—'}</span>
          </div>
          <div class="course-name">${esc(c.name)}</div>
          <div class="course-instructor">
            ${c.instructor ? `✧ Prof. ${esc(c.instructor)}` : '✧ Professeur inconnu'}${dateStr}
          </div>
          <div class="stars">${stars}</div>
          ${thumbs}
          ${tags ? `<div class="tag-list">${tags}</div>` : ''}
          ${c.notes ? `<div class="note-preview">"${esc(c.notes)}"</div>` : ''}
          <div class="card-actions">
            <button class="btn-sm"    data-action="edit"   data-id="${c.id}">✎ Modifier</button>
            <button class="btn-sm danger" data-action="delete" data-id="${c.id}">✕ Supprimer</button>
          </div>
        </div>
      </div>`;
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function renderAll() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const filtered = courses.filter(c => {
      const matchF = currentFilter === 'all' || c.type === currentFilter;
      const matchS = !search
        || c.name.toLowerCase().includes(search)
        || (c.instructor||'').toLowerCase().includes(search)
        || (c.tags||[]).some(t => t.toLowerCase().includes(search));
      return matchF && matchS;
    });

    const prim = filtered.filter(c => c.type === 'principale');
    const sec  = filtered.filter(c => c.type === 'secondaire');
    const main = document.getElementById('main-content');

    if (!filtered.length) {
      main.innerHTML = `<div class="courses-grid">
        <div class="empty-state">
          Aucun cours trouvé dans le grimoire…
          <span>Ajoute ton premier cours avec le bouton ci-dessus.</span>
        </div></div>`;
      return;
    }

    let html = '';

    if (prim.length && currentFilter !== 'secondaire') {
      html += `<div class="section-block">
        <div class="section-header">
          <div class="section-title">✦ Matières Principales</div>
          <div class="section-line"></div>
          <div class="section-count">${prim.length} cours</div>
        </div>
        <div class="courses-grid">${prim.map(buildCard).join('')}</div>
      </div>`;
    }

    if (sec.length && currentFilter !== 'principale') {
      html += `<div class="section-block">
        <div class="section-header">
          <div class="section-title" style="color:var(--teal)">◈ Matières Secondaires</div>
          <div class="section-line"></div>
          <div class="section-count">${sec.length} cours</div>
        </div>
        <div class="courses-grid">${sec.map(buildCard).join('')}</div>
      </div>`;
    }

    main.innerHTML = html;
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = courses.length;
    const scored = courses.filter(c => c.score && c.score !== 'N/A' && c.score !== 'Échec');
    if (!scored.length) { document.getElementById('stat-avg').textContent = '—'; return; }
    const m = {A:4,B:3,C:2,D:1};
    const avg = scored.reduce((s,c) => s + (m[c.score]||0), 0) / scored.length;
    document.getElementById('stat-avg').textContent = ['D','C','B','A'][Math.round(avg)-1] || '—';
  }

  /* ════════════════════════════════
     DÉLÉGATION D'ÉVÉNEMENTS — grille
     (corrige le bug "supprimer")
  ════════════════════════════════ */
  document.getElementById('main-content').addEventListener('click', function(e) {
    // Boutons Modifier / Supprimer
    const btn = e.target.closest('[data-action]');
    if (btn) {
      e.stopPropagation();
      const id = btn.dataset.id;
      if (btn.dataset.action === 'edit')   openModal(courses.find(c => c.id === id));
      if (btn.dataset.action === 'delete') deleteCourse(id);
      return;
    }

    // Clic sur image principale ou miniature → lightbox
    const img = e.target.closest('[data-img-index]');
    if (img) {
      e.stopPropagation();
      const c = courses.find(c => c.id === img.dataset.courseId);
      if (c) openLightbox(c.images || [], parseInt(img.dataset.imgIndex, 10));
      return;
    }

    // Clic sur la carte → ouvrir modale d'édition
    const card = e.target.closest('.course-card');
    if (card) openModal(courses.find(c => c.id === card.dataset.id));
  });

  /* ════════════════════════════════
     FILTRE & RECHERCHE
  ════════════════════════════════ */
  document.querySelector('.toolbar').addEventListener('click', e => {
    const btn = e.target.closest('[data-filter]');
    if (!btn) return;
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderAll();
  });

  document.getElementById('search-input').addEventListener('input', renderAll);
  document.getElementById('btn-add').addEventListener('click', () => openModal(null));

  /* ════════════════════════════════
     MODAL
  ════════════════════════════════ */
  function openModal(course) {
    editingId     = course ? course.id : null;
    selectedScore = course ? (course.score || '') : '';
    selectedStars = course ? (course.stars || 0) : 0;
    pendingImages = course ? (course.images || []).map(url => ({dataUrl:url})) : [];

    document.getElementById('modal-title-text').textContent = course ? 'Modifier le cours' : 'Nouveau cours';

    const matSel    = document.getElementById('f-matiere');
    const customRow = document.getElementById('custom-name-row');

    if (course) {
      const known = [...PRINCIPALES, ...SECONDAIRES];
      if (known.includes(course.name)) {
        matSel.value = course.name;
        customRow.style.display = 'none';
      } else {
        matSel.value = 'Autre';
        document.getElementById('f-custom-name').value = course.name;
        customRow.style.display = 'block';
      }
    } else {
      matSel.value = 'Sortilège';
      document.getElementById('f-custom-name').value = '';
      customRow.style.display = 'none';
    }

    document.getElementById('f-type').value      = course ? course.type : 'principale';
    document.getElementById('f-instructor').value = course ? (course.instructor||'') : '';
    document.getElementById('f-date').value       = course ? (course.date||'') : new Date().toISOString().slice(0,10);
    document.getElementById('f-notes').value      = course ? (course.notes||'') : '';
    document.getElementById('f-tags').value       = course ? (course.tags||[]).join(', ') : '';

    document.querySelectorAll('.score-option').forEach(el => {
      el.classList.toggle('selected', el.dataset.score === selectedScore);
    });

    renderPreviews();
    updateStarsPicker();
    document.getElementById('modal').style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal').style.display = 'none'; }

  // Fermer en cliquant le fond
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });

  document.getElementById('btn-cancel').addEventListener('click', closeModal);

  // Score picker
  document.querySelector('.score-picker').addEventListener('click', e => {
    const opt = e.target.closest('.score-option');
    if (!opt) return;
    selectedScore = opt.dataset.score;
    document.querySelectorAll('.score-option').forEach(el => el.classList.remove('selected'));
    opt.classList.add('selected');
  });

  // Stars picker
  document.getElementById('stars-picker').addEventListener('click', e => {
    const s = e.target.closest('.star-pick');
    if (!s) return;
    selectedStars = parseInt(s.dataset.v, 10);
    updateStarsPicker();
  });

  function updateStarsPicker() {
    document.querySelectorAll('.star-pick').forEach(s => {
      s.classList.toggle('on', parseInt(s.dataset.v, 10) <= selectedStars);
    });
  }

  // Matière → auto-type + champ personnalisé
  document.getElementById('f-matiere').addEventListener('change', function() {
    const isCustom = this.value === 'Autre';
    document.getElementById('custom-name-row').style.display = isCustom ? 'block' : 'none';
    const t = getAutoType(this.value);
    if (t) document.getElementById('f-type').value = t;
  });

  /* ════════════════════════════════
     IMAGES (upload & drag-drop)
  ════════════════════════════════ */
  document.getElementById('img-file-input').addEventListener('change', async function() {
    for (const f of Array.from(this.files||[])) {
      pendingImages.push({ dataUrl: await fileToDataUrl(f) });
    }
    renderPreviews();
    this.value = '';
  });

  const ua = document.getElementById('upload-area');
  ua.addEventListener('dragover',  e => { e.preventDefault(); ua.style.borderColor = 'var(--gold)'; });
  ua.addEventListener('dragleave', () => { ua.style.borderColor = 'var(--border)'; });
  ua.addEventListener('drop', async e => {
    e.preventDefault();
    ua.style.borderColor = 'var(--border)';
    for (const f of Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'))) {
      pendingImages.push({ dataUrl: await fileToDataUrl(f) });
    }
    renderPreviews();
  });

  function renderPreviews() {
    document.getElementById('img-preview-list').innerHTML = pendingImages.map((img, i) => `
      <div class="img-preview-item">
        <img class="img-preview-thumb" src="${img.dataUrl}" alt="Aperçu ${i+1}" />
        <button class="img-remove-btn" data-preview-index="${i}">✕</button>
      </div>`).join('');
  }

  document.getElementById('img-preview-list').addEventListener('click', e => {
    const btn = e.target.closest('[data-preview-index]');
    if (!btn) return;
    pendingImages.splice(parseInt(btn.dataset.previewIndex, 10), 1);
    renderPreviews();
  });

  /* ════════════════════════════════
     ENREGISTRER / SUPPRIMER
  ════════════════════════════════ */
  document.getElementById('btn-save').addEventListener('click', () => {
    const matSel   = document.getElementById('f-matiere').value;
    const isCustom = matSel === 'Autre';
    const name     = isCustom
      ? document.getElementById('f-custom-name').value.trim()
      : matSel;

    if (!name) { alert('Veuillez indiquer le nom du cours.'); return; }

    const tags   = document.getElementById('f-tags').value.split(',').map(t => t.trim()).filter(Boolean);
    const images = pendingImages.map(i => i.dataUrl);

    const obj = {
      id:         editingId || Date.now().toString(),
      name,
      type:       document.getElementById('f-type').value,
      instructor: document.getElementById('f-instructor').value.trim(),
      date:       document.getElementById('f-date').value,
      score:      selectedScore,
      stars:      selectedStars,
      notes:      document.getElementById('f-notes').value.trim(),
      tags,
      images
    };

    if (editingId) { courses = courses.map(c => c.id === editingId ? obj : c); }
    else           { courses.unshift(obj); }

    saveCourses();
    closeModal();
    renderAll();
    updateStats();
    showToast('✦ Cours enregistré');
  });

  function deleteCourse(id) {
    if (!confirm('Supprimer ce cours du grimoire ?')) return;
    courses = courses.filter(c => c.id !== id);
    saveCourses();
    renderAll();
    updateStats();
    showToast('✕ Cours supprimé');
  }

  /* ════════════════════════════════
     LIGHTBOX
  ════════════════════════════════ */
  function openLightbox(imgs, idx) {
    lbImages = imgs;
    lbIndex  = idx;
    document.getElementById('lb-img').src = lbImages[lbIndex];
    updateLbCounter();
    document.getElementById('lightbox').classList.add('open');
  }

  function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

  function lbNav(dir) {
    lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;
    document.getElementById('lb-img').src = lbImages[lbIndex];
    updateLbCounter();
  }

  function updateLbCounter() {
    document.getElementById('lb-counter').textContent =
      lbImages.length > 1 ? `${lbIndex+1} / ${lbImages.length}` : '';
  }

  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox') ||
        e.target === document.getElementById('lb-img')) closeLightbox();
  });
  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); lbNav(-1); });
  document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); lbNav(1); });

  /* ════════════════════════════════
     CLAVIER
  ════════════════════════════════ */
  document.addEventListener('keydown', e => {
    if (document.getElementById('lightbox').classList.contains('open')) {
      if (e.key === 'ArrowLeft')  lbNav(-1);
      if (e.key === 'ArrowRight') lbNav(1);
      if (e.key === 'Escape')     closeLightbox();
      return;
    }
    if (e.key === 'Escape' && document.getElementById('modal').style.display !== 'none') {
      closeModal();
    }
  });

  /* ════════════════════════════════
     INIT
  ════════════════════════════════ */
  loadCourses();
  renderAll();
  updateStats();
</script>
</body>
</html>
